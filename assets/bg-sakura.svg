    </g>
  </defs>
  <g opacity="0.5">
    <use href="#bl" transform="translate(45 42) scale(1.05)"/>
    <use href="#bl" transform="translate(152 70) scale(0.72) rotate(22)"/>
    <use href="#bl" transform="translate(96 134) scale(1.25) rotate(-16)"/>
    <use href="#bl" transform="translate(186 176) scale(0.62) rotate(40)"/>
