<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <!-- Seamless-ish sakura komon: scattered 5-petal blossoms, soft tones.
       Tiled as a subtle background motif under the anime sky gradient. -->
