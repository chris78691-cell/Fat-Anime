    <g id="bl">
      <g fill="#ff9ec4">
        <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5"/>
        <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" transform="rotate(72)"/>
        <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" transform="rotate(144)"/>
        <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" transform="rotate(216)"/>
        <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" transform="rotate(288)"/>
