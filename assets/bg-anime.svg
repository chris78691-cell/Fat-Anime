<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2ea6f5"/>
      <stop offset="0.16" stop-color="#56bdf8"/>
      <stop offset="0.34" stop-color="#8fd4fb"/>
      <stop offset="0.52" stop-color="#bfe6fc"/>
      <stop offset="0.7" stop-color="#e2f2fb"/>
      <stop offset="0.85" stop-color="#f6f0ec"/>
      <stop offset="1" stop-color="#fdf3e8"/>
    </linearGradient>
    <radialGradient id="lavCorner" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a585f0" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#9a6bff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9a6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffaf0" stop-opacity="0.95"/>
      <stop offset="0.28" stop-color="#fff0cf" stop-opacity="0.7"/>
      <stop offset="0.55" stop-color="#ffe2a6" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffd58c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#fff6df" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffeec2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerScrim" cx="0.5" cy="0.46" r="0.62">
      <stop offset="0" stop-color="#fdf6ee" stop-opacity="0.8"/>
      <stop offset="0.4" stop-color="#fdf6ee" stop-opacity="0.42"/>
      <stop offset="0.72" stop-color="#fdf6ee" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#fdf6ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#fbf4ec"/>
      <stop offset="1" stop-color="#d3e4f3"/>
    </linearGradient>
    <linearGradient id="cloudCool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfdff"/>
      <stop offset="1" stop-color="#cadcef"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6d8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff6d8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blz" cx="0.5" cy="0.36" r="0.78">
      <stop offset="0" stop-color="#fff6fb"/>
      <stop offset="0.55" stop-color="#ffd2e5"/>
      <stop offset="1" stop-color="#ff9ec6"/>
    </radialGradient>
    <filter id="softBig" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="softMed" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="softSm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="rayBlur" x="-60%" y="-30%" width="220%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <!-- soft-shaded 5-petal cherry blossom with notched petals + stamens -->
    <g id="sak">
      <g fill="url(#blz)" stroke="#ff89b4" stroke-width="0.5">
        <path d="M0,-1 C-5,-4 -6.6,-9.5 -2.6,-13 C-1.3,-14.2 -0.6,-12.2 0,-12.7 C0.6,-12.2 1.3,-14.2 2.6,-13 C6.6,-9.5 5,-4 0,-1 Z"/>
        <path d="M0,-1 C-5,-4 -6.6,-9.5 -2.6,-13 C-1.3,-14.2 -0.6,-12.2 0,-12.7 C0.6,-12.2 1.3,-14.2 2.6,-13 C6.6,-9.5 5,-4 0,-1 Z" transform="rotate(72)"/>
        <path d="M0,-1 C-5,-4 -6.6,-9.5 -2.6,-13 C-1.3,-14.2 -0.6,-12.2 0,-12.7 C0.6,-12.2 1.3,-14.2 2.6,-13 C6.6,-9.5 5,-4 0,-1 Z" transform="rotate(144)"/>
        <path d="M0,-1 C-5,-4 -6.6,-9.5 -2.6,-13 C-1.3,-14.2 -0.6,-12.2 0,-12.7 C0.6,-12.2 1.3,-14.2 2.6,-13 C6.6,-9.5 5,-4 0,-1 Z" transform="rotate(216)"/>
        <path d="M0,-1 C-5,-4 -6.6,-9.5 -2.6,-13 C-1.3,-14.2 -0.6,-12.2 0,-12.7 C0.6,-12.2 1.3,-14.2 2.6,-13 C6.6,-9.5 5,-4 0,-1 Z" transform="rotate(288)"/>
      </g>
      <g fill="#ffcf4d">
        <circle cx="0" cy="-3.4" r="1.05"/>
        <circle cx="3.2" cy="-1" r="1.05"/>
        <circle cx="2" cy="2.8" r="1.05"/>
        <circle cx="-2" cy="2.8" r="1.05"/>
        <circle cx="-3.2" cy="-1" r="1.05"/>
      </g>
      <circle r="1.5" fill="#ffb84a"/>
    </g>
  </defs>

  <rect width="1200" height="1700" fill="url(#sky)"/>

  <rect x="-200" y="-200" width="900" height="900" fill="url(#lavCorner)" opacity="0.9"/>
  <rect x="500" y="-260" width="1000" height="820" fill="url(#lavCorner)" opacity="0.5"/>

  <g filter="url(#rayBlur)" opacity="0.5" style="mix-blend-mode:screen">
    <polygon points="950,-60 1040,-60 760,820 640,820" fill="url(#ray)"/>
    <polygon points="1080,-60 1150,-60 1010,860 880,860" fill="url(#ray)"/>
    <polygon points="850,-60 905,-60 540,760 450,760" fill="url(#ray)"/>
    <polygon points="1180,-40 1240,-40 1200,700 1090,700" fill="url(#ray)"/>
  </g>

  <ellipse cx="1010" cy="190" rx="620" ry="560" fill="url(#sunGlow)"/>
  <ellipse cx="1015" cy="175" rx="230" ry="220" fill="url(#sunCore)"/>

  <g filter="url(#softBig)">
    <ellipse cx="170" cy="150" rx="320" ry="150" fill="url(#cloudCool)" opacity="0.85"/>
    <ellipse cx="1050" cy="560" rx="300" ry="130" fill="url(#cloudCool)" opacity="0.6"/>
    <ellipse cx="220" cy="640" rx="260" ry="120" fill="url(#cloudCool)" opacity="0.55"/>
    <ellipse cx="980" cy="1480" rx="360" ry="150" fill="url(#cloudCool)" opacity="0.6"/>
    <ellipse cx="200" cy="1520" rx="320" ry="140" fill="url(#cloudCool)" opacity="0.5"/>
  </g>

  <g filter="url(#softBig)">
    <g fill="url(#cloudWarm)">
      <ellipse cx="240" cy="130" rx="200" ry="95"/>
      <ellipse cx="80" cy="175" rx="160" ry="80"/>
      <ellipse cx="400" cy="170" rx="150" ry="78"/>
      <ellipse cx="300" cy="90" rx="120" ry="62"/>
    </g>
    <g fill="url(#cloudWarm)" opacity="0.96">
      <ellipse cx="1080" cy="120" rx="210" ry="92"/>
      <ellipse cx="1200" cy="170" rx="170" ry="80"/>
      <ellipse cx="940" cy="150" rx="140" ry="70"/>
      <ellipse cx="1120" cy="70" rx="120" ry="55"/>
    </g>
  </g>

  <g filter="url(#softMed)">
    <g fill="url(#cloudWarm)" opacity="0.9">
      <ellipse cx="150" cy="540" rx="180" ry="78"/>
      <ellipse cx="300" cy="575" rx="140" ry="66"/>
      <ellipse cx="60" cy="585" rx="120" ry="58"/>
    </g>
    <g fill="url(#cloudWarm)" opacity="0.62">
      <ellipse cx="1110" cy="520" rx="190" ry="74"/>
      <ellipse cx="1010" cy="560" rx="140" ry="62"/>
      <ellipse cx="1210" cy="565" rx="130" ry="58"/>
    </g>
  </g>

  <g filter="url(#softMed)">
    <g fill="url(#cloudWarm)" opacity="0.9">
      <ellipse cx="240" cy="1470" rx="240" ry="92"/>
      <ellipse cx="60" cy="1520" rx="180" ry="78"/>
      <ellipse cx="420" cy="1510" rx="160" ry="70"/>
    </g>
    <g fill="url(#cloudWarm)" opacity="0.88">
      <ellipse cx="1000" cy="1490" rx="250" ry="96"/>
      <ellipse cx="1180" cy="1530" rx="190" ry="80"/>
      <ellipse cx="830" cy="1525" rx="160" ry="70"/>
    </g>
  </g>

  <g filter="url(#softMed)" opacity="0.5">
    <ellipse cx="600" cy="60" rx="280" ry="70" fill="url(#cloudWarm)"/>
    <ellipse cx="600" cy="1660" rx="360" ry="90" fill="url(#cloudWarm)"/>
  </g>

  <rect width="1200" height="1700" fill="url(#centerScrim)"/>

  <g filter="url(#softSm)" opacity="0.55" style="mix-blend-mode:screen">
    <circle cx="120" cy="430" r="26" fill="#fff3da"/>
    <circle cx="260" cy="360" r="16" fill="#ffd3ea"/>
    <circle cx="70" cy="760" r="20" fill="#e6d4ff"/>
    <circle cx="1080" cy="380" r="30" fill="#fff3da"/>
    <circle cx="1150" cy="700" r="18" fill="#ffd3ea"/>
    <circle cx="1010" cy="300" r="14" fill="#ffffff"/>
    <circle cx="160" cy="1180" r="22" fill="#e6d4ff"/>
    <circle cx="1120" cy="1140" r="24" fill="#fff3da"/>
    <circle cx="1040" cy="1320" r="15" fill="#ffd3ea"/>
    <circle cx="100" cy="1340" r="17" fill="#ffffff"/>
  </g>

  <!-- refined sakura clusters, tucked into the top corners (no center intrusion) -->
  <g opacity="0.95">
    <use href="#sak" transform="translate(86 72) scale(2.6) rotate(8)"/>
    <use href="#sak" transform="translate(166 132) scale(2.0) rotate(-22)"/>
    <use href="#sak" transform="translate(54 168) scale(1.6) rotate(40)"/>
    <use href="#sak" transform="translate(214 64) scale(1.7) rotate(16)"/>
    <use href="#sak" transform="translate(138 36) scale(1.25) rotate(-12)"/>
    <use href="#sak" transform="translate(250 150) scale(1.15) rotate(28)"/>
  </g>
  <g opacity="0.95">
    <use href="#sak" transform="translate(1114 72) scale(2.6) rotate(-8)"/>
    <use href="#sak" transform="translate(1034 132) scale(2.0) rotate(22)"/>
    <use href="#sak" transform="translate(1146 168) scale(1.6) rotate(-40)"/>
    <use href="#sak" transform="translate(986 64) scale(1.7) rotate(-16)"/>
    <use href="#sak" transform="translate(1062 36) scale(1.25) rotate(12)"/>
    <use href="#sak" transform="translate(950 150) scale(1.15) rotate(-28)"/>
  </g>
  <!-- a couple drifting near the lower edges for balance -->
  <g opacity="0.7">
    <use href="#sak" transform="translate(120 1280) scale(1.5) rotate(24)"/>
    <use href="#sak" transform="translate(1086 1352) scale(1.5) rotate(-30)"/>
    <use href="#sak" transform="translate(70 980) scale(1.0) rotate(-14)"/>
  </g>

  <rect x="-200" y="900" width="1600" height="900" fill="url(#centerScrim)" opacity="0.25"/>
</svg>
